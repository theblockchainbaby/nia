name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Nia with dev + judgment extras
        run: |
          uv venv
          uv pip install -e ".[dev,judgment]"

      - name: Lint with ruff
        run: |
          uv run ruff check nia/ tests/

      - name: Run pytest
        run: |
          uv run pytest -v --tb=short
